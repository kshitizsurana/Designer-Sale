<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <title>DesignerSale.com.au — Australia's designer boutique sales, in one place</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Image manifest (must load BEFORE data.js so window.IMG is populated) -->
  <script src="src/image-manifest.js"></script>

  <!-- Data (plain JS) -->
  <script src="src/data.js"></script>

  <!-- Tweaks panel (Babel) -->
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>

  <!-- Components -->
  <script type="text/babel" src="src/components/atoms.jsx"></script>
  <script type="text/babel" src="src/components/chrome.jsx"></script>
  <script type="text/babel" src="src/components/product-card.jsx"></script>

  <script type="text/babel" src="src/pages/home.jsx"></script>

  <script type="text/babel" src="src/pages/about.jsx"></script>
  <script type="text/babel" src="src/pages/wishlist.jsx"></script>

  <script type="text/babel" src="src/pages/product-detail.jsx"></script>
  <script type="text/babel" src="src/pages/brand.jsx"></script>
  <script type="text/babel" src="src/pages/merchant.jsx"></script>
  <script type="text/babel" src="src/pages/landing-page.jsx"></script>

  <!-- App entry -->
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
