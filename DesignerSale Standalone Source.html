  <!-- Image manifest -->
  <script src="src/image-manifest.js"></script>
  <!-- Standalone bundler: override window.IMG entries with inlined blob URLs -->
  <script>
    (function () {
      if (!window.IMG) window.IMG = {};
      document.querySelectorAll('meta[name="ext-resource-dependency"]').forEach(function (m) {
        var id = m.dataset.resourceId;
        var blob = window.__resources && window.__resources[id];
        if (blob) window.IMG[id] = blob;
      });
    })();
  </script>
